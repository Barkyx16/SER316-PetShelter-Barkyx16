name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Checkstyle
        run: ./gradlew checkstyleMain

      - name: SpotBugs
        run: ./gradlew spotbugsMain

